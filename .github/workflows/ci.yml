name: Scanner CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        flake8 . --exclude=alembic,venv --count --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        DB_USER: fake_user
        DB_PASS: fake_password
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: fake_db
      run: |
        pytest